<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFSEXTR - Auto Mode</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
        .container { display: flex; gap: 20px; align-items: flex-start; }
        
        /* Contenedor del Canvas */
        .canvas-container { 
            flex: 2; 
            background: #fff; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            overflow: auto; 
            max-height: 85vh;
        }
        
        #statusBar { 
            padding: 12px; 
            background: #0056b3; 
            color: white; 
            font-weight: bold; 
            border-radius: 8px 8px 0 0;
        }

        /* Panel de edición */
        .editor-container { 
            flex: 1; 
            background: #fff; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            position: sticky; 
            top: 20px;
        }

        .row-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 10px; 
            background: #fdfdfd;
            padding: 5px;
            border-radius: 4px;
        }

        .color-preview { 
            width: 35px; 
            height: 35px; 
            border-radius: 4px; 
            border: 1px solid #ccc;
            flex-shrink: 0;
        }

        input { 
            padding: 6px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
        }

        .hex-input { width: 80px; font-family: monospace; font-size: 12px; }
        .text-input { flex-grow: 1; }

        button { 
            width: 100%; 
            padding: 12px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        pre { 
            background: #222; 
            color: #adff2f; 
            padding: 10px; 
            font-size: 12px; 
            border-radius: 4px; 
            max-height: 200px; 
            overflow: auto; 
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>

    <h2 style="margin-top:0;">GFSEXTR <span style="font-weight:normal; font-size:14px; color:#666;">| Industrial Color Extractor</span></h2>
    
    <div style="margin-bottom: 15px;">
        <label for="imageUpload" style="cursor:pointer; background:#ddd; padding:8px 15px; border-radius:4px;">📂 Subir Especificación</label>
        <input type="file" id="imageUpload" accept="image/*" style="display:none;">
    </div>

    <div class="container">
        <div class="canvas-container">
            <div id="statusBar">Esperando archivo...</div>
            <canvas id="imgCanvas"></canvas>
        </div>
        
        <div class="editor-container">
            <h3>Datos Extraídos</h3>
            <div id="dataRows">
                </div>
            <br>
            <button id="exportBtn" style="display:none;">GENERAR JSON</button>
            <pre id="jsonOutput" style="display:none;"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
