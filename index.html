<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFSEXTR - Manual Precision Mode</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; color: #2d3436; margin: 0; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 10px 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .main-layout { display: flex; gap: 20px; padding: 0 20px; align-items: flex-start; }
        
        /* Visor de Imagen */
        .canvas-wrapper { 
            flex: 2; 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        #statusBar { 
            padding: 15px; 
            background: #2d3436; 
            color: #fab1a0; 
            font-size: 14px;
            border-bottom: 2px solid #0984e3;
        }

        #imgCanvas { 
            cursor: crosshair; 
            max-width: 100%; 
            display: block; 
        }

        /* Panel de Control/Edición */
        .editor-panel { 
            flex: 1; 
            background: #fff; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .row-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 10px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        .row-item:hover { background: #f9f9f9; }

        .color-preview { 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            border: 2px solid #dfe6e9;
            flex-shrink: 0;
        }

        input { border: 1px solid #dfe6e9; padding: 8px; border-radius: 4px; outline: none; }
        input:focus { border-color: #0984e3; }
        .hex-input { width: 75px; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; }
        .text-input { flex-grow: 1; font-size: 14px; }

        .btn-primary { 
            background: #00b894; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer;
            margin-top: 15px;
        }
        
        .btn-primary:hover { background: #55efc4; }

        pre { 
            background: #2d3436; 
            color: #00cec9; 
            padding: 15px; 
            border-radius: 6px; 
            font-size: 12px; 
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 20px; color: #0984e3;">GFSEXTR <span style="color:#636e72; font-weight:normal;">| Tech-Pack Extractor</span></h1>
        <label for="imageUpload" style="cursor:pointer; background:#0984e3; color:white; padding:8px 20px; border-radius:4px; font-weight:bold;">
            SUBIR IMAGEN
        </label>
        <input type="file" id="imageUpload" accept="image/*" style="display:none;">
    </div>

    <div class="main-layout">
        <div class="canvas-wrapper">
            <div id="statusBar">Esperando imagen de especificaciones...</div>
            <div style="overflow: auto; max-height: 75vh;">
                <canvas id="imgCanvas"></canvas>
            </div>
        </div>
        
        <div class="editor-panel">
            <h3 style="margin-top:0;">Datos Extraídos</h3>
            <div id="dataRows">
                </div>
            
            <button id="exportBtn" class="btn-primary" style="display:none;">EXPORTAR A JSON</button>
            <pre id="jsonOutput" style="display:none;"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
